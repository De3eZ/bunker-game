<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бункер - игра о выживании</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🚀 БУНКЕР</h1>
            <p>Игра о выживании в постапокалипсисе</p>
        </div>
        
        <div class="game-options">
            <div class="card">
                <h2>Создать новую игру</h2>
                <form id="createGameForm">
                    <input type="text" id="hostName" placeholder="Ваше имя" required>
                    <button type="submit" class="btn-primary">Создать игру</button>
                </form>
            </div>
            
            <div class="card">
                <h2>Присоединиться к игре</h2>
                <form id="joinGameForm">
                    <input type="text" id="playerName" placeholder="Ваше имя" required>
                    <input type="text" id="gameCode" placeholder="Код комнаты" required>
                    <button type="submit" class="btn-secondary">Присоединиться</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
